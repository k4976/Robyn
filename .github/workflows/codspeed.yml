name: codspeed-benchmarks

on:
  push:
    branches:
      - "main" # or "master"
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

# env:
  # UV_SYSTEM_PYTHON: 1

# 1. Setup Repo using checkout.
# 2. Setup python 3.9.
# 3. Setup UV and install pip.
jobs:
  benchmarks:
    runs-on: ubuntu-22.04
    steps:
      - name: Setting up Repo.
        uses: actions/checkout@v4
      
      - name: Setting up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Setting up UV
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          # python-version: 3.10.17
          activate-environment: true

      - name: Installing pip
        run: uv pip install pip
      # - name: Install Python 3.9
      #   run: uv python install 3.9


      - name: Install dependencies with uv
        run: |
          # echo -e "\nEcho: Showing Files..."
          # ls -a
          echo -e "\n Echo: again pip list-2"
          uv pip list

          uv sync --group test

          echo -e "\n Echo: checking where is maturin"
          whereis uv maturin

          # echo -e "\n Echo2: checking where is maturin"
          # which maturin

          echo -e "\n Echo: checking matrix.os=${{ matrix.os }}"
          echo -e "\n Echo: checking matrix.os=${{ matrix }}"
          whereis python
          which python


      - name: Setup Rust part of the project
        run: |
          uv pip list
          pip list
          whereis pip
          which pip
          # uv run maturin build -i python --universal2 --out dist
          maturin build -i python --universal2 --out dist
          # uv pip install --no-index --find-links=dist/ robyn
          pip install --no-index --find-links=dist/ robyn
      - name: Run benchmarks
        uses: CodSpeedHQ/action@v2
        with:
          token: ${{ secrets.CODSPEED_TOKEN }}
          run: |
            whereis pytest
            whereis python
            which python
            which pytest
            pip list
            uv pip list
            pytest integration_tests --codspeed

